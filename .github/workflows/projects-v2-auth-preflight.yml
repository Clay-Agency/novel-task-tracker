name: Projects v2 auth preflight

on:
  workflow_dispatch:
  schedule:
    # Daily preflight to detect missing Actions vars/secrets before other workflows run.
    - cron: '10 2 * * *'

permissions:
  contents: read
  issues: write

concurrency:
  group: projects-v2-auth-preflight
  cancel-in-progress: false

jobs:
  preflight:
    name: Verify Projects v2 auth vars/secrets are configured
    runs-on: ubuntu-latest
    steps:
      - name: Check required Actions vars/secrets
        id: preflight_check
        shell: bash
        env:
          # Prefer vars.PROJECTS_APP_ID, but allow secrets.PROJECTS_APP_ID as a legacy fallback.
          VARS_PROJECTS_APP_ID: ${{ vars.PROJECTS_APP_ID }}
          SECRETS_PROJECTS_APP_ID: ${{ secrets.PROJECTS_APP_ID }}
          PROJECTS_APP_ID: ${{ vars.PROJECTS_APP_ID || secrets.PROJECTS_APP_ID }}
          PROJECTS_APP_PRIVATE_KEY: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}
          PROJECT_STATUS_SYNC_TOKEN: ${{ secrets.PROJECT_STATUS_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          has_vars_app_id=false
          has_secrets_app_id=false
          has_app_id=false
          has_app_key=false
          has_pat=false

          if [ -n "${VARS_PROJECTS_APP_ID}" ]; then has_vars_app_id=true; fi
          if [ -n "${SECRETS_PROJECTS_APP_ID}" ]; then has_secrets_app_id=true; fi
          if [ -n "${PROJECTS_APP_ID}" ]; then has_app_id=true; fi
          if [ -n "${PROJECTS_APP_PRIVATE_KEY}" ]; then has_app_key=true; fi
          if [ -n "${PROJECT_STATUS_SYNC_TOKEN}" ]; then has_pat=true; fi

          docs_url="https://github.com/${GITHUB_REPOSITORY}/blob/main/docs/ops/projects-v2-auth-runbook.md"

          append() { printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY"; }
          status() { if [ "$1" = true ]; then printf 'present'; else printf 'missing'; fi; }

          append "# Projects v2 auth preflight"
          append ""
          append "This workflow checks that **at least one** supported auth configuration is present:"
          append "- GitHub App (preferred): vars.PROJECTS_APP_ID + secrets.PROJECTS_APP_PRIVATE_KEY"
          append "- PAT fallback: secrets.PROJECT_STATUS_SYNC_TOKEN"
          append ""
          append "Runbook: ${docs_url}"
          append ""
          append "## Detected (present/missing)"
          append "- \`vars.PROJECTS_APP_ID\`: $(status ${has_vars_app_id})"
          append "- \`secrets.PROJECTS_APP_ID\` (legacy): $(status ${has_secrets_app_id})"
          append "- \`secrets.PROJECTS_APP_PRIVATE_KEY\`: $(status ${has_app_key})"
          append "- \`secrets.PROJECT_STATUS_SYNC_TOKEN\` (PAT fallback): $(status ${has_pat})"

          if [ "$has_app_id" = true ] && [ "$has_app_key" = true ]; then
            append "Projects v2 auth preflight OK (GitHub App configured)."
            exit 0
          fi

          if [ "$has_pat" = true ]; then
            append "Projects v2 auth preflight OK (PAT fallback configured)."
            exit 0
          fi

          # Fail loudly with actionable guidance
          msg="Missing Projects v2 auth configuration. Configure either: (A) GitHub App vars.PROJECTS_APP_ID + secrets.PROJECTS_APP_PRIVATE_KEY (preferred), or (B) PAT fallback secrets.PROJECT_STATUS_SYNC_TOKEN. Docs: ${docs_url}"

          if [ "$has_app_id" = true ] && [ "$has_app_key" = false ]; then
            msg="Found PROJECTS_APP_ID but missing secrets.PROJECTS_APP_PRIVATE_KEY. ${msg}"
          elif [ "$has_app_id" = false ] && [ "$has_app_key" = true ]; then
            msg="Found secrets.PROJECTS_APP_PRIVATE_KEY but missing vars.PROJECTS_APP_ID. ${msg}"
          fi

          echo "::error title=Projects v2 auth preflight failed::${msg}"
          append ""
          append "## Next steps"
          append "1. Follow the runbook: ${docs_url}"
          append "2. Set GitHub Actions vars/secrets (repo-level or org-level) with the exact names above."

          exit 1

      - name: Post low-noise reminder on issue #80 when auth is missing
        if: ${{ failure() && steps.preflight_check.conclusion == 'failure' }}
        uses: actions/github-script@v7
        env:
          REMINDER_MARKER: "<!-- projects-v2-auth-preflight-reminder -->"
          ISSUE_NUMBER: "80"
          MIN_INTERVAL_DAYS: "7"
        with:
          script: |
            const issue_number = Number(process.env.ISSUE_NUMBER || '80');
            const marker = process.env.REMINDER_MARKER;
            const minIntervalDays = Number(process.env.MIN_INTERVAL_DAYS || '7');
            const minIntervalMs = minIntervalDays * 24 * 60 * 60 * 1000;
            const now = Date.now();

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const markerComments = comments
              .filter((c) => (c.body || '').includes(marker))
              .sort((a, b) => new Date(b.created_at).getTime() - new Date(a.created_at).getTime());

            const lastMarkerComment = markerComments[0];
            if (lastMarkerComment) {
              const lastTs = new Date(lastMarkerComment.created_at).getTime();
              if (!Number.isNaN(lastTs) && now - lastTs < minIntervalMs) {
                const ageHours = ((now - lastTs) / (1000 * 60 * 60)).toFixed(1);
                core.info(`Skipping reminder comment; last marker comment is ${ageHours}h old (threshold ${minIntervalDays}d).`);
                return;
              }
            }

            const runbookUrl = `https://github.com/${owner}/${repo}/blob/main/docs/ops/projects-v2-auth-runbook.md`;
            const issue80Url = `https://github.com/${owner}/${repo}/issues/80`;
            const smokeWorkflowUrl = `https://github.com/${owner}/${repo}/actions/workflows/projects-v2-auth-smoke.yml`;

            const body = [
              marker,
              '⚠️ **Projects v2 auth is still missing in Actions configuration.**',
              '',
              'Quickstart:',
              '- GitHub App (preferred): set `vars.PROJECTS_APP_ID` + `secrets.PROJECTS_APP_PRIVATE_KEY`',
              '- PAT fallback: set `secrets.PROJECT_STATUS_SYNC_TOKEN`',
              '',
              `References:`,
              `- Tracking issue: ${issue80Url}`,
              `- Runbook: ${runbookUrl}`,
              `- Projects v2 auth smoke test workflow: ${smokeWorkflowUrl}`,
              '',
              '_This reminder is rate-limited and posts at most once every 7 days while auth remains missing._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });

            core.info('Posted reminder comment to issue #80.');
