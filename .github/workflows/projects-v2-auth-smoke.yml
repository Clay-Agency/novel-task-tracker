name: Projects v2 auth smoke test

on:
  workflow_dispatch:
    inputs:
      org:
        description: 'GitHub organization login (default Clay-Agency)'
        required: false
        type: string
        default: 'Clay-Agency'
      project_number:
        description: 'Org Projects v2 number (default 1)'
        required: false
        type: number
        default: 1

permissions:
  contents: read

concurrency:
  group: projects-v2-auth-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Query org ProjectV2 metadata (read-only)
    runs-on: ubuntu-latest
    env:
      # NOTE: Avoid using the top-level `inputs.*` context in expressions.
      # It only exists for workflow_dispatch/workflow_call and can break evaluation
      # if this workflow is ever extended to other triggers.
      ORG_LOGIN: ${{ github.event.inputs.org || 'Clay-Agency' }}
      PROJECT_NUMBER: ${{ github.event.inputs.project_number || 1 }}
    steps:
      - name: Resolve Projects v2 auth configuration
        id: auth
        shell: bash
        env:
          VARS_PROJECTS_APP_ID: ${{ vars.PROJECTS_APP_ID }}
          SECRETS_PROJECTS_APP_ID: ${{ secrets.PROJECTS_APP_ID }}
          PROJECTS_APP_ID: ${{ vars.PROJECTS_APP_ID || secrets.PROJECTS_APP_ID }}
          PROJECTS_APP_PRIVATE_KEY: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}
          PROJECT_STATUS_SYNC_TOKEN: ${{ secrets.PROJECT_STATUS_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          has_vars_app_id=false
          has_secrets_app_id=false
          has_app_id=false
          has_app_key=false
          has_pat=false

          if [ -n "${VARS_PROJECTS_APP_ID}" ]; then has_vars_app_id=true; fi
          if [ -n "${SECRETS_PROJECTS_APP_ID}" ]; then has_secrets_app_id=true; fi
          if [ -n "${PROJECTS_APP_ID}" ]; then has_app_id=true; fi
          if [ -n "${PROJECTS_APP_PRIVATE_KEY}" ]; then has_app_key=true; fi
          if [ -n "${PROJECT_STATUS_SYNC_TOKEN}" ]; then has_pat=true; fi

          echo "has_vars_app_id=${has_vars_app_id}" >> "$GITHUB_OUTPUT"
          echo "has_secrets_app_id=${has_secrets_app_id}" >> "$GITHUB_OUTPUT"
          echo "has_app_key=${has_app_key}" >> "$GITHUB_OUTPUT"
          echo "has_pat=${has_pat}" >> "$GITHUB_OUTPUT"

          if [ "$has_app_id" = true ] && [ "$has_app_key" = true ]; then
            echo "use_app=true" >> "$GITHUB_OUTPUT"
            echo "app_id=${PROJECTS_APP_ID}" >> "$GITHUB_OUTPUT"
          else
            echo "use_app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App token (preferred)
        id: app-token
        if: ${{ steps.auth.outputs.use_app == 'true' }}
        uses: actions/create-github-app-token@v2
        continue-on-error: true
        with:
          app-id: ${{ steps.auth.outputs.app_id }}
          private-key: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}
          owner: ${{ env.ORG_LOGIN }}
          repositories: ${{ github.event.repository.name }}

      - name: Fail fast (missing/invalid Projects v2 auth)
        if: ${{ steps.app-token.outputs.token == '' && steps.auth.outputs.has_pat != 'true' }}
        shell: bash
        env:
          HAS_VARS_APP_ID: ${{ steps.auth.outputs.has_vars_app_id }}
          HAS_SECRETS_APP_ID: ${{ steps.auth.outputs.has_secrets_app_id }}
          HAS_APP_KEY: ${{ steps.auth.outputs.has_app_key }}
          HAS_PAT: ${{ steps.auth.outputs.has_pat }}
          USE_APP: ${{ steps.auth.outputs.use_app }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          docs_url="https://github.com/${GITHUB_REPOSITORY}/blob/main/docs/ops/projects-v2-auth-runbook.md"
          issue80_url="https://github.com/${GITHUB_REPOSITORY}/issues/80"

          append() { printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY"; }
          status() { if [ "$1" = true ] || [ "$1" = 'true' ]; then printf 'present'; else printf 'missing'; fi; }

          append "# Projects v2 auth smoke test — auth not available"
          append ""
          append "Runbook: ${docs_url}"
          append "Tracking issue: ${issue80_url}"
          append ""
          append "## Detected (present/missing)"
          append "- \`vars.PROJECTS_APP_ID\`: $(status "${HAS_VARS_APP_ID}")"
          append "- \`secrets.PROJECTS_APP_ID\` (legacy): $(status "${HAS_SECRETS_APP_ID}")"
          append "- \`secrets.PROJECTS_APP_PRIVATE_KEY\`: $(status "${HAS_APP_KEY}")"
          append "- \`secrets.PROJECT_STATUS_SYNC_TOKEN\` (PAT fallback): $(status "${HAS_PAT}")"
          append ""
          append "## Result"
          append "- GitHub App config detected (app id + key): ${USE_APP}"
          append "- GitHub App token created: $( [ -n "${APP_TOKEN}" ] && printf yes || printf no )"
          append "- PAT available: ${HAS_PAT}"

          echo "::error title=No Projects v2 auth token available::Missing or invalid Projects v2 auth configuration. See runbook: ${docs_url}"
          exit 1

      - name: Query ProjectV2 metadata and write summary
        uses: actions/github-script@v7
        if: ${{ steps.app-token.outputs.token != '' || steps.auth.outputs.has_pat == 'true' }}
        with:
          github-token: ${{ steps.app-token.outputs.token || secrets.PROJECT_STATUS_SYNC_TOKEN }}
          script: |
            const orgLogin = process.env.ORG_LOGIN;
            const projectNumber = Number(process.env.PROJECT_NUMBER);

            const query = `
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    title
                    url
                    fields(first: 100) {
                      nodes {
                        __typename
                        ... on ProjectV2FieldCommon {
                          id
                          name
                          dataType
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          dataType
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `;

            let res;
            try {
              res = await github.graphql(query, { org: orgLogin, number: projectNumber });
            } catch (e) {
              core.setFailed(
                `Projects v2 auth appears misconfigured or lacks permissions. ${e?.message || e}\n` +
                  `See docs: https://github.com/Clay-Agency/novel-task-tracker/blob/main/docs/ops/projects-v2-auth-runbook.md ` +
                  `and Issue #80: https://github.com/Clay-Agency/novel-task-tracker/issues/80`
              );
              return;
            }

            const project = res?.organization?.projectV2;
            if (!project?.id) {
              core.setFailed(`Could not find org projectV2 ${orgLogin}#${projectNumber} (or token lacks access).`);
              return;
            }

            const fields = project?.fields?.nodes || [];

            const lines = [];
            lines.push(`# Projects v2 auth smoke test`);
            lines.push('');
            lines.push(`Org: \\`${orgLogin}\\``);
            lines.push(`Project: #${projectNumber} — **${project.title}**`);
            lines.push(`Project ID: \\`${project.id}\\``);
            if (project.url) lines.push(`URL: ${project.url}`);
            lines.push('');
            lines.push(`## Fields (first ${fields.length})`);
            lines.push('');

            if (fields.length === 0) {
              lines.push('_No fields returned._');
            } else {
              for (const f of fields) {
                if (!f) continue;
                const type = f.__typename || 'Unknown';
                const dataType = f.dataType ? ` (${f.dataType})` : '';
                lines.push(`- \\`${type}\\`${dataType}: **${f.name || '(no name)'}** (id: \\`${f.id}\\`)`);

                if (Array.isArray(f.options) && f.options.length) {
                  const opts = f.options.map((o) => o?.name).filter(Boolean).join(', ');
                  lines.push(`  - options: ${opts}`);
                }
              }
            }

            await core.summary.addRaw(lines.join('\n'), true).write();
