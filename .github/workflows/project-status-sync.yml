name: Sync Clay Project status

on:
  pull_request:
    types: [closed]
  issues:
    types: [closed]
  workflow_dispatch:
    inputs:
      reconcile:
        description: 'Reconcile all items in Project #1 (default true)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: project-status-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ORG_LOGIN: Clay-Agency
      PROJECT_NUMBER: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Projects v2 auth configuration
        id: auth
        shell: bash
        env:
          PROJECTS_APP_ID: ${{ vars.PROJECTS_APP_ID || secrets.PROJECTS_APP_ID }}
          PROJECTS_APP_PRIVATE_KEY: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}
          PROJECT_STATUS_SYNC_TOKEN: ${{ secrets.PROJECT_STATUS_SYNC_TOKEN }}
        run: node .github/scripts/resolve-projects-auth.cjs

      - name: Create GitHub App token (preferred)
        id: app-token
        if: ${{ steps.auth.outputs.use_app == 'true' }}
        uses: actions/create-github-app-token@v2
        continue-on-error: true
        with:
          app-id: ${{ steps.auth.outputs.app_id }}
          private-key: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}
          owner: ${{ env.ORG_LOGIN }}
          repositories: ${{ github.event.repository.name }}

      - name: Select Projects v2 token (App > PAT)
        id: token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PAT_TOKEN: ${{ secrets.PROJECT_STATUS_SYNC_TOKEN }}
        run: node .github/scripts/select-projects-token.cjs

      - name: Skip (missing Projects v2 auth)
        if: ${{ steps.token.outputs.token == '' }}
        shell: bash
        run: |
          echo "::warning title=No Projects v2 auth token available::Skipping Project status sync because no Projects v2 auth token is configured. Configure Projects v2 auth: GitHub App (preferred) set vars.PROJECTS_APP_ID + secrets.PROJECTS_APP_PRIVATE_KEY, OR PAT set secrets.PROJECT_STATUS_SYNC_TOKEN. Runbook: https://github.com/Clay-Agency/novel-task-tracker/blob/main/docs/ops/projects-v2-auth-runbook.md ; Tracking issue #80: https://github.com/Clay-Agency/novel-task-tracker/issues/80"
          echo "Note: The scheduled auth check is handled by the 'Projects v2 auth preflight' workflow. See issue #121: https://github.com/Clay-Agency/novel-task-tracker/issues/121"
          exit 0

      - name: Sync Project item fields (Status / Done date / Needs decision)
        uses: actions/github-script@v7
        if: ${{ steps.token.outputs.token != '' }}
        with:
          # NOTE: Projects v2 (org ProjectV2) cannot be mutated with the built-in GITHUB_TOKEN.
          # Provide either a GitHub App token (preferred) or a PAT.
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { run } = require('./.github/scripts/project-status-sync.cjs');
            await run({ github, context, core, env: process.env });
