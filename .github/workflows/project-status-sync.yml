name: Sync Clay Project status

on:
  pull_request:
    types: [closed]
  issues:
    types: [closed]
  workflow_dispatch:
    inputs:
      reconcile:
        description: 'Reconcile all items in Project #1 (default true)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: project-status-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ORG_LOGIN: Clay-Agency
      PROJECT_NUMBER: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Projects v2 auth configuration
        id: auth
        shell: bash
        env:
          PROJECTS_APP_ID: ${{ vars.PROJECTS_APP_ID || secrets.PROJECTS_APP_ID }}
          PROJECTS_APP_PRIVATE_KEY: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}
          PROJECT_STATUS_SYNC_TOKEN: ${{ secrets.PROJECT_STATUS_SYNC_TOKEN }}
        run: node .github/scripts/resolve-projects-auth.cjs

      - name: Create GitHub App token (preferred)
        id: app-token
        if: ${{ steps.auth.outputs.use_app == 'true' }}
        uses: actions/create-github-app-token@v2
        continue-on-error: true
        with:
          app-id: ${{ steps.auth.outputs.app_id }}
          private-key: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}
          owner: ${{ env.ORG_LOGIN }}
          repositories: ${{ github.event.repository.name }}

      - name: Select Projects v2 token (App > PAT)
        id: token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          PAT_TOKEN: ${{ secrets.PROJECT_STATUS_SYNC_TOKEN }}
        run: node .github/scripts/select-projects-token.cjs

      - name: Skip fast (missing Projects v2 auth)
        if: ${{ steps.token.outputs.token == '' }}
        shell: bash
        env:
          VARS_PROJECTS_APP_ID: ${{ vars.PROJECTS_APP_ID }}
          SECRETS_PROJECTS_APP_ID: ${{ secrets.PROJECTS_APP_ID }}
          PROJECTS_APP_PRIVATE_KEY: ${{ secrets.PROJECTS_APP_PRIVATE_KEY }}
          PROJECT_STATUS_SYNC_TOKEN: ${{ secrets.PROJECT_STATUS_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          docs_url="https://github.com/${GITHUB_REPOSITORY}/blob/main/docs/ops/projects-v2-auth-runbook.md"
          issue80_url="https://github.com/${GITHUB_REPOSITORY}/issues/80"
          issue121_url="https://github.com/${GITHUB_REPOSITORY}/issues/121"

          has_vars_app_id=false
          has_secrets_app_id=false
          has_app_key=false
          has_pat=false

          if [ -n "${VARS_PROJECTS_APP_ID}" ]; then has_vars_app_id=true; fi
          if [ -n "${SECRETS_PROJECTS_APP_ID}" ]; then has_secrets_app_id=true; fi
          if [ -n "${PROJECTS_APP_PRIVATE_KEY}" ]; then has_app_key=true; fi
          if [ -n "${PROJECT_STATUS_SYNC_TOKEN}" ]; then has_pat=true; fi

          append() { printf '%s\n' "$1" >> "$GITHUB_STEP_SUMMARY"; }
          status() { if [ "$1" = true ]; then printf 'present'; else printf 'missing'; fi; }

          append "# Project status sync — skipped (Projects v2 auth missing)"
          append ""
          append "Runbook: ${docs_url}"
          append "Tracking issue: ${issue80_url}"
          append ""
          append "## Detected (present/missing)"
          append "- \`vars.PROJECTS_APP_ID\`: $(status ${has_vars_app_id})"
          append "- \`secrets.PROJECTS_APP_ID\` (legacy): $(status ${has_secrets_app_id})"
          append "- \`secrets.PROJECTS_APP_PRIVATE_KEY\`: $(status ${has_app_key})"
          append "- \`secrets.PROJECT_STATUS_SYNC_TOKEN\` (PAT fallback): $(status ${has_pat})"

          echo "::warning title=No Projects v2 auth token available::Skipping Project status sync because no Projects v2 auth token is configured. Configure Projects v2 auth: GitHub App (preferred) set vars.PROJECTS_APP_ID + secrets.PROJECTS_APP_PRIVATE_KEY, OR PAT set secrets.PROJECT_STATUS_SYNC_TOKEN. Runbook: ${docs_url} ; Tracking issue #80: ${issue80_url}"
          echo "Note: The scheduled auth check is handled by the 'Projects v2 auth preflight' workflow. See issue #121: ${issue121_url}"
          exit 0

      - name: Sync Project item fields (Status / Done date / Needs decision)
        uses: actions/github-script@v7
        if: ${{ steps.token.outputs.token != '' }}
        with:
          # NOTE: Projects v2 (org ProjectV2) cannot be mutated with the built-in GITHUB_TOKEN.
          # Provide either a GitHub App token (preferred) or a PAT.
          github-token: ${{ steps.token.outputs.token }}
          script: |
            const { run } = require('./.github/scripts/project-status-sync.cjs');
            await run({ github, context, core, env: process.env });
